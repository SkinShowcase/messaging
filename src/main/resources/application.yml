spring:
  application:
    name: messaging
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/messaging;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: ${JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

server:
  port: 8082

# TCP-сервер уведомлений о новых сообщениях (отдельный порт)
messaging:
  tcp:
    port: ${MESSAGING_TCP_PORT:9090}
  # Поддержка: фиксированный синтетический SteamID64 из 17 нулей (см. SupportSyntheticSteamId), отдельный Steam-аккаунт не нужен.

# Админ: POST /api/admin/messaging/support/messages (X-Admin-Api-Key). Переопределение: env ADMIN_API_KEY.
admin:
  api-key: "${ADMIN_API_KEY:change-me-admin-api-key}"

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.skinsshowcase.messaging: DEBUG
    org.springframework.web: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
# Отдельный документ: JWT и клиент auth (без верхнеуровневого auth, чтобы не было DuplicateKey при слиянии конфигов).
app:
  auth:
    jwt:
      secret: ${AUTH_JWT_SECRET:}
      expiration-ms: ${AUTH_JWT_EXPIRATION_MS:86400000}
    service:
      base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8081}
      connect-timeout-ms: 3000
      read-timeout-ms: 10000
  message-crypto:
    key: ${MESSAGING_MESSAGE_CRYPTO_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  transport-security:
    require-secure-transport: ${MESSAGING_REQUIRE_SECURE_TRANSPORT:false}
